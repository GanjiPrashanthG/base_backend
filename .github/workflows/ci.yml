name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:latest
        ports:
          - 27017:27017
    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/mayday
      MONGODB_ENABLED: "1"
      NODE_ENV: test
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run version:validate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run mongo:migrate:status
      - run: npm run verify
